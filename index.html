<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FlightCheck</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f2d5e">
  <meta name="description" content="Cessna 172P flight checklist for student pilots — works offline">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlightCheck">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════════════
       HOME VIEW — Aircraft Selection
  ════════════════════════════════════════════════════════════════════════════ -->
  <div id="home-view" class="view">
    <header class="app-header">
      <div class="header-inner">
        <div class="home-header-content">
          <div class="logo-row">
            <svg class="logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z" fill="currentColor"/>
            </svg>
            <span class="logo-text">FlightCheck</span>
            <button id="update-btn" class="icon-btn update-check-btn" aria-label="Check for updates">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 4v6h6M23 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <p class="logo-tagline">Cessna 172P Training Checklists</p>
        </div>
      </div>
    </header>

    <main class="home-main">
      <p class="section-label">Select Aircraft</p>
      <div id="aircraft-list" class="aircraft-list">
        <!-- Populated by app.js -->
      </div>
    </main>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       CHECKLIST VIEW
  ════════════════════════════════════════════════════════════════════════════ -->
  <div id="checklist-view" class="view hidden">
    <header class="app-header">
      <div class="header-inner">
        <div class="checklist-header-top">
          <button id="back-btn" class="icon-btn" aria-label="Back to aircraft list">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="header-title-group">
            <h1 id="checklist-aircraft-name" class="checklist-aircraft-name"></h1>
            <p id="checklist-progress-text" class="checklist-progress-text"></p>
          </div>
          <button id="reset-btn" class="reset-btn" aria-label="Reset checklist">Reset</button>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>
      </div>
    </header>

    <main class="checklist-main">
      <div id="phases-container" class="phases-container">
        <!-- Populated by app.js -->
      </div>
    </main>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       RESET CONFIRM MODAL
  ════════════════════════════════════════════════════════════════════════════ -->
  <div id="reset-modal" class="modal-overlay hidden" role="dialog"
       aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 class="modal-title" id="modal-title">Reset Checklist?</h2>
      <p class="modal-body">
        All checked items will be cleared and the checklist will return to its starting state.
        This cannot be undone.
      </p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
        <button id="modal-confirm" class="btn btn-danger">Reset</button>
      </div>
    </div>
  </div>

  <!-- Update available banner -->
  <div id="update-banner" class="update-banner hidden" role="alert" aria-live="polite">
    <span class="update-banner-text">New version available</span>
    <button class="update-banner-reload" onclick="window.location.reload()">Reload</button>
    <button class="update-banner-dismiss" id="update-dismiss" aria-label="Dismiss">✕</button>
  </div>

  <!-- Data files — add more aircraft here as separate script tags -->
  <script src="data/cessna172p.js"></script>
  <script src="data/cessna172p_n227an.js"></script>

  <!-- App logic -->
  <script src="app.js"></script>
</body>
</html>
